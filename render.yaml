services:
  - type: web
    name: xiaozhi-groq-server
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python main.py"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MCP_ENDPOINT
        sync: false   # Incolla qui il tuo token WSS da xiaozhi.me
